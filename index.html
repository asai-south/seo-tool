<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEO診断ツール</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:sans-serif;background:#f4f6f9;color:#1a1a2e}
header{background:#1a1a2e;color:#fff;padding:16px 24px}
header h1{font-size:18px}
.wrap{max-width:1000px;margin:0 auto;padding:24px}
.card{background:#fff;border-radius:12px;padding:24px;margin-bottom:20px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.row{display:flex;gap:10px}
input[type=url]{flex:1;padding:10px 14px;border:2px solid #ddd;border-radius:8px;font-size:14px}
input:focus{outline:none;border-color:#3a86ff}
.btn{padding:10px 20px;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer}
.blue{background:#3a86ff;color:#fff}.blue:disabled{background:#aaa}
.green{background:#06d6a0;color:#fff}
.out{background:#fff;color:#3a86ff;border:2px solid #3a86ff}
.bw{height:6px;background:#eee;border-radius:3px;margin:10px 0;display:none}
.bv{height:100%;background:#3a86ff;border-radius:3px;transition:width .3s}
.mg{font-size:13px;color:#666;margin:6px 0}
.hidden{display:none}
.ul{max-height:240px;overflow-y:auto;border:1px solid #eee;border-radius:8px;margin-top:12px}
.ur{padding:8px 14px;border-bottom:1px solid #f5f5f5;font-size:13px;display:flex;align-items:center;justify-content:space-between}
.ur:last-child{border:none}
.ur a{color:#3a86ff;text-decoration:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:75%}
.tg{font-size:11px;padding:2px 8px;border-radius:12px;background:#f0f2f7;color:#666;flex-shrink:0}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:#f4f6f9;padding:10px 12px;text-align:left;font-size:12px;font-weight:600;color:#555;border-bottom:2px solid #eee}
td{padding:9px 12px;border-bottom:1px solid #f5f5f5;vertical-align:top}
.sA{color:#06d6a0;font-weight:700}.sB{color:#3a86ff;font-weight:700}.sC{color:#f4a261;font-weight:700}.sD{color:#e63946;font-weight:700}
.it{display:inline-block;font-size:11px;padding:2px 6px;border-radius:4px;margin:1px}
.ie{background:#fff0f0;color:#e63946}.iw{background:#fff8f0;color:#f4a261}.io{background:#f0fdf9;color:#06d6a0}
.sm{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.sk{background:#fff;border-radius:10px;padding:14px 18px;text-align:center;box-shadow:0 2px 6px rgba(0,0,0,.05)}
.sk .n{font-size:26px;font-weight:700}.sk .l{font-size:12px;color:#888;margin-top:4px}
.nT{color:#3a86ff}.nE{color:#e63946}.nW{color:#f4a261}.nO{color:#06d6a0}
.ac{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
.tu{max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tu a{color:#3a86ff;text-decoration:none;font-size:12px}
.tc{max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px}
.sp{display:inline-block;width:13px;height:13px;border:2px solid #fff;border-top-color:transparent;border-radius:50%;animation:sp .6s linear infinite;vertical-align:middle;margin-right:5px}
@keyframes sp{to{transform:rotate(360deg)}}
.warn{background:#fffbea;border:1px solid #f4a261;border-radius:8px;padding:10px 14px;font-size:13px;color:#856404;margin-top:8px}
</style>
</head>
<body>
<header><h1>SEO診断ツール β — サイトマップ取得 → SEO品質チェック → 修正仕様書出力</h1></header>
<div class="wrap">
<div class="card">
  <h2 style="font-size:15px;margin-bottom:14px">① 診断するサイトのURLを入力</h2>
  <div class="row">
    <input type="url" id="su" placeholder="https://example.com">
    <button class="btn blue" id="b1" onclick="goSM()">サイトマップを取得</button>
  </div>
  <div class="bw" id="w1"><div class="bv" id="p1" style="width:0%"></div></div>
  <div class="mg" id="m1"></div>
</div>
<div class="card hidden" id="c2">
  <h2 style="font-size:15px;margin-bottom:14px">② 取得したURL <span id="uc" style="font-size:13px;color:#3a86ff;font-weight:400"></span></h2>
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
    <div class="mg">URLを選択してSEO診断を開始してください</div>
    <div style="display:flex;gap:8px">
      <button class="btn out" onclick="selAll()">全選択</button>
      <button class="btn blue" id="b2" onclick="goDiag()">選択ページをSEO診断</button>
    </div>
  </div>
  <div class="ul" id="ul"></div>
  <div class="bw" id="w2"><div class="bv" id="p2" style="width:0%"></div></div>
  <div class="mg" id="m2"></div>
</div>
<div class="sm hidden" id="c3">
  <div class="sk"><div class="n nT" id="sT">0</div><div class="l">診断ページ数</div></div>
  <div class="sk"><div class="n nE" id="sE">0</div><div class="l">要修正（重大）</div></div>
  <div class="sk"><div class="n nW" id="sW">0</div><div class="l">要改善（注意）</div></div>
  <div class="sk"><div class="n nO" id="sO">0</div><div class="l">良好</div></div>
</div>
<div class="card hidden" id="c4">
  <h2 style="font-size:15px;margin-bottom:4px">③ SEO診断結果</h2>
  <div class="ac">
    <button class="btn green" onclick="dlCSV()">📥 修正仕様書CSV出力</button>
    <button class="btn out" onclick="fi('all')">全て表示</button>
    <button class="btn out" style="color:#e63946;border-color:#e63946" onclick="fi('err')">要修正のみ</button>
  </div>
  <div style="overflow-x:auto;margin-top:14px">
    <table><thead><tr>
      <th>スコア</th><th>URL</th><th>SEOタイトル</th><th>Description</th><th>H1</th><th>問題点</th>
    </tr></thead><tbody id="rb"></tbody></table>
  </div>
</div>
</div>
<script>
var PX='https://api.allorigins.win/get?url=',AU=[],DR=[],SU=new Set();

async function fp(u,retry){
  retry=retry||0;
  try{
    var r=await fetch(PX+encodeURIComponent(u));
    var d=await r.json();
    if(!d.contents&&retry<2){
      await new Promise(function(r){setTimeout(r,1500);});
      return fp(u,retry+1);
    }
    return d.contents||'';
  }catch(e){
    if(retry<2){
      await new Promise(function(r){setTimeout(r,1500);});
      return fp(u,retry+1);
    }
    return '';
  }
}

async function goSM(){
  var u=document.getElementById('su').value.trim();
  if(!u){alert('URLを入力してください');return;}
  if(!u.startsWith('http'))u='https://'+u;
  u=u.replace(/\/$/,'');
  var b=document.getElementById('b1');b.disabled=true;b.innerHTML='<span class="sp"></span>取得中...';
  var w=document.getElementById('w1'),p=document.getElementById('p1'),m=document.getElementById('m1');
  w.style.display='block';AU=[];m.textContent='robots.txtを確認中...';p.style.width='10%';
  try{
    var su=[];
    try{
      var rb=await fp(u+'/robots.txt');
      var mt=rb.match(/Sitemap:\s*(.+)/gi)||[];
      su=mt.map(function(x){return x.replace(/Sitemap:\s*/i,'').trim();});
    }catch(e){}
    // 標準的なサイトマップURLも試す
    var defaults=[u+'/sitemap.xml',u+'/sitemap_index.xml',u+'/wp-sitemap.xml',u+'/post-sitemap.xml',u+'/page-sitemap.xml'];
    for(var i=0;i<defaults.length;i++){
      if(!su.includes(defaults[i]))su.push(defaults[i]);
    }
    m.textContent='サイトマップを解析中...';p.style.width='20%';
    for(var i=0;i<su.length;i++){
      try{await pSM(su[i]);}catch(e){}
      p.style.width=(20+Math.round(i/su.length*50))+'%';
    }
    if(!AU.length){
      m.textContent='リンクを収集中...';p.style.width='60%';
      await crl(u,u,0,2);
    }
    if(!AU.includes(u)&&!AU.includes(u+'/'))AU.unshift(u);
    var dn=new URL(u).hostname;
    AU=[...new Set(AU)].filter(function(x){
      try{return new URL(x).hostname===dn&&!x.match(/\.(jpg|jpeg|png|gif|pdf|zip|xml)$/i);}
      catch(e){return false;}
    });
    // URLをカテゴリ別にソート
    AU.sort(function(a,b){return gt(a).localeCompare(gt(b));});
    p.style.width='100%';
    m.textContent=AU.length+'件のURLを取得しました';
    rndr();document.getElementById('c2').classList.remove('hidden');
  }catch(e){m.textContent='エラー: '+e.message;}
  b.disabled=false;b.innerHTML='サイトマップを取得';
}

async function pSM(url){
  var x=await fp(url);
  if(!x)return;
  var p=new DOMParser();var d=p.parseFromString(x,'text/xml');
  // サイトマップインデックス
  var sl=d.querySelectorAll('sitemap loc');
  for(var i=0;i<sl.length;i++){
    try{await pSM(sl[i].textContent.trim());}catch(e){}
  }
  // 通常のURL
  var ul=d.querySelectorAll('url loc');
  for(var i=0;i<ul.length;i++){
    var u=ul[i].textContent.trim();
    if(!AU.includes(u))AU.push(u);
  }
}

async function crl(url,base,dep,max){
  if(dep>max||AU.length>150)return;
  try{
    var h=await fp(url);
    if(!h)return;
    if(!AU.includes(url))AU.push(url);
    if(dep>=max)return;
    var p=new DOMParser();var d=p.parseFromString(h,'text/html');
    var org=new URL(base).origin;
    var ls=[...d.querySelectorAll('a[href]')].map(function(a){
      try{return new URL(a.href,url).href;}catch(e){return null;}
    }).filter(function(x){
      return x&&x.startsWith(org)&&!x.includes('#')&&!AU.includes(x)&&!x.match(/\.(pdf|jpg|png|gif|zip|xml)$/i);
    });
    for(var i=0;i<Math.min(ls.length,20);i++){
      if(AU.length>=150)break;
      await crl(ls[i],base,dep+1,max);
    }
  }catch(e){}
}

function gt(u){
  if(u.match(/\/(blog|news|article|column|post)\/[^/]+\/[^/]+/i))return '記事';
  if(u.match(/\/(blog|news|article|column|post)/i))return 'ブログ';
  if(u.match(/\/(case|works|jirei)/i))return '施工事例';
  if(u.match(/\/(service|menu|price)/i))return 'サービス';
  if(u.match(/\/(about|company)/i))return '会社情報';
  if(u.match(/\/contact/i))return 'お問合わせ';
  if(u.replace(/https?:\/\/[^\/]+\/?$/,'').length===0)return 'TOP';
  return 'その他';
}

function rndr(){
  SU=new Set(AU);
  document.getElementById('uc').textContent='（'+AU.length+'件）';
  var h='';
  AU.forEach(function(u,i){
    var p=u.replace(/https?:\/\/[^\/]+/,'')||'/';
    h+='<div class="ur"><label style="display:flex;align-items:center;gap:8px;flex:1;overflow:hidden;cursor:pointer"><input type="checkbox" onchange="tog('+i+',this.checked)" checked><a href="'+u+'" target="_blank">'+p+'</a></label><span class="tg">'+gt(u)+'</span></div>';
  });
  document.getElementById('ul').innerHTML=h;
}

function tog(i,c){if(c)SU.add(AU[i]);else SU.delete(AU[i]);}
function selAll(){SU=new Set(AU);document.querySelectorAll('#ul input').forEach(function(c){c.checked=true;});}

async function goDiag(){
  var us=[...SU];
  if(!us.length){alert('URLを選択してください');return;}
  var b=document.getElementById('b2');b.disabled=true;b.innerHTML='<span class="sp"></span>診断中...';
  var w=document.getElementById('w2'),p=document.getElementById('p2'),m=document.getElementById('m2');
  w.style.display='block';DR=[];document.getElementById('rb').innerHTML='';
  for(var i=0;i<us.length;i++){
    m.textContent='('+(i+1)+'/'+us.length+') 診断中: '+us[i].replace(/https?:\/\/[^\/]+/,'');
    p.style.width=Math.round(i/us.length*100)+'%';
    var r=await ap(us[i]);DR.push(r);addR(r);
    document.getElementById('c4').classList.remove('hidden');updS();
  }
  p.style.width='100%';m.textContent='診断完了！ '+DR.length+'ページ分析しました';
  b.disabled=false;b.innerHTML='選択ページをSEO診断';
}

async function ap(url){
  var r={url:url,ti:'',de:'',h1:'',h2:[],is:[],sc:'A',err:false};
  try{
    var h=await fp(url);
    if(!h){
      r.is.push({t:'w',s:'取得に時間がかかっています。再試行してください'});
      r.sc='B';r.err=true;return r;
    }
    var p=new DOMParser();var d=p.parseFromString(h,'text/html');
    r.ti=(d.querySelector('title')||{textContent:''}).textContent.trim();
    r.de=((d.querySelector('meta[name="description"]')||{getAttribute:function(){return '';}}).getAttribute('content')||'').trim();
    r.h1=(d.querySelector('h1')||{textContent:''}).textContent.trim();
    r.h2=[...d.querySelectorAll('h2')].map(function(e){return e.textContent.trim();}).slice(0,5);
    // タイトルチェック
    if(!r.ti)r.is.push({t:'e',s:'タイトルなし'});
    else if(r.ti.length<20)r.is.push({t:'w',s:'タイトル短('+r.ti.length+'字)'});
    else if(r.ti.length>60)r.is.push({t:'w',s:'タイトル長('+r.ti.length+'字)'});
    else r.is.push({t:'o',s:'タイトルOK('+r.ti.length+'字)'});
    // Descriptionチェック
    if(!r.de)r.is.push({t:'e',s:'Description未設定'});
    else if(r.de.length<50)r.is.push({t:'w',s:'Desc短('+r.de.length+'字)'});
    else if(r.de.length>120)r.is.push({t:'w',s:'Desc長('+r.de.length+'字)'});
    else r.is.push({t:'o',s:'DescOK('+r.de.length+'字)'});
    // H1チェック
    var h1s=d.querySelectorAll('h1');
    if(!h1s.length)r.is.push({t:'e',s:'H1なし'});
    else if(h1s.length>1)r.is.push({t:'w',s:'H1が'+h1s.length+'個'});
    else r.is.push({t:'o',s:'H1:1個OK'});
    // H2チェック
    if(!r.h2.length)r.is.push({t:'w',s:'H2なし'});
    else r.is.push({t:'o',s:'H2:'+r.h2.length+'個'});
    // OGPチェック
    if(!d.querySelector('meta[property="og:title"]'))r.is.push({t:'w',s:'OGP未設定'});
    // canonicalチェック
    if(!d.querySelector('link[rel="canonical"]'))r.is.push({t:'w',s:'canonical未設定'});
  }catch(e){
    r.is.push({t:'w',s:'取得に時間がかかっています。再試行してください'});
    r.sc='B';r.err=true;return r;
  }
  var ec=r.is.filter(function(i){return i.t==='e';}).length;
  var wc=r.is.filter(function(i){return i.t==='w';}).length;
  if(ec>=2)r.sc='D';else if(ec===1)r.sc='C';else if(wc>=2)r.sc='B';else r.sc='A';
  return r;
}

function addR(r){
  var tb=document.getElementById('rb');
  var ih=r.is.map(function(i){return '<span class="it i'+(i.t==='e'?'e':i.t==='w'?'w':'o')+'">'+i.s+'</span>';}).join('');
  var pa=r.url.replace(/https?:\/\/[^\/]+/,'')||'/';
  var tr=document.createElement('tr');tr.dataset.sc=r.sc;
  var tiHtml=r.ti?r.ti:'<span style="color:#e63946">未設定</span>';
  var deHtml=r.de?r.de.slice(0,40)+'...':'<span style="color:#e63946">未設定</span>';
  var h1Html=r.h1?r.h1:'<span style="color:#e63946">なし</span>';
  tr.innerHTML='<td class="s'+r.sc+'">'+r.sc+'</td><td class="tu"><a href="'+r.url+'" target="_blank">'+pa+'</a></td><td class="tc" title="'+r.ti+'">'+tiHtml+'</td><td class="tc" title="'+r.de+'">'+deHtml+'</td><td class="tc" title="'+r.h1+'">'+h1Html+'</td><td>'+ih+'</td>';
  tb.appendChild(tr);
}

function updS(){
  document.getElementById('c3').classList.remove('hidden');
  document.getElementById('sT').textContent=DR.length;
  document.getElementById('sE').textContent=DR.filter(function(r){return r.sc==='C'||r.sc==='D';}).length;
  document.getElementById('sW').textContent=DR.filter(function(r){return r.sc==='B';}).length;
  document.getElementById('sO').textContent=DR.filter(function(r){return r.sc==='A';}).length;
}

function fi(t){
  document.querySelectorAll('#rb tr').forEach(function(tr){
    tr.style.display=(t==='all'||(t==='err'&&(tr.dataset.sc==='C'||tr.dataset.sc==='D')))?'':'none';
  });
}

function sug(r){
  var s=[];
  if(!r.ti)s.push('タイトルを設定（地域名+キーワード+会社名、30〜60文字）');
  else if(r.ti.length<20)s.push('タイトルを30文字以上に拡充');
  else if(r.ti.length>60)s.push('タイトルを60文字以内に短縮');
  if(!r.de)s.push('Descriptionを設定（80〜120文字）');
  if(!r.h1)s.push('H1タグを1つ設定');
  if(!r.h2.length)s.push('H2見出しを追加');
  return s.join(' / ')||'特になし';
}

function dlCSV(){
  var B='\uFEFF';
  var hs=['スコア','URL','SEOタイトル','タイトル文字数','Description','Description文字数','H1','H2（上位3件）','問題点','修正提案'];
  var rows=DR.map(function(r){
    var is=r.is.filter(function(i){return i.t!=='o';}).map(function(i){return i.s;}).join(' / ');
    return [r.sc,r.url,r.ti,r.ti.length,r.de,r.de.length,r.h1,r.h2.slice(0,3).join(' / '),is,sug(r)].map(function(v){return '"'+String(v).replace(/"/g,'""')+'"';}).join(',');
  });
  var csv=B+hs.join(',')+'\n'+rows.join('\n');
  var bl=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  var a=document.createElement('a');a.href=URL.createObjectURL(bl);
  a.download='SEO修正仕様書_'+new Date().toISOString().slice(0,10)+'.csv';a.click();
}
</script>
</body>
</html>
